
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 Date Invitation 💖</title>
    <style>
        body {
            background-color: #ffd6e7;
            font-family: 'Helvetica', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #d63384;
        }

        #container {
            text-align: center;
            background-color: #ffd6e7;
            padding: 20px;
        }

        h1 { font-size: 24px; font-weight: bold; margin-bottom: 40px; }

        button {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        #yes-btn {
            background-color: #ff69b4;
            color: white;
            position: absolute;
            top: 200px;
            left: 200px;
        }

        #no-btn {
            background-color: white;
            color: black;
            position: absolute;
            top: 200px;
            left: 420px;
            transition: all 0.1s ease;
        }

        select, option { font-size: 16px; padding: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="first-screen">
        <h1>🌸 Will You Go On A Date With Me? 🌸</h1>
        <button id="yes-btn" onclick="showForm()">💖 YES 💖</button>
        <button id="no-btn" onmouseover="moveNo()">No</button>
    </div>

    <div id="form-screen" class="hidden">
        <h1>💕 Yay!! I'm so happy! 💕</h1>
        <p>When are you free?</p>
        
        <label>Pick a day in July:</label><br>
        <select id="day"></select><br><br>

        <label>Choose a time:</label><br>
        <select id="time"></select><br><br>

        <label>What are you feeling?</label><br>
        <input type="radio" name="food" value="Pasta" checked> Pasta<br>
        <input type="radio" name="food" value="Burgers"> Burgers<br>
        <input type="radio" name="food" value="Sushi"> Sushi<br>
        <input type="radio" name="food" value="Cocktail"> Cocktail<br><br>

        <button onclick="finish()">Set Our Date ❤️</button>
    </div>

    <div id="finish-screen" class="hidden">
        <h1 id="summary-text" style="white-space: pre-line;"></h1>
    </div>

    <script>
        // Setup selects
        const daySelect = document.getElementById('day');
        for(let i=1; i<=31; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i;
            daySelect.appendChild(opt);
        }

        const times = ["12:00 PM", "12:30 PM", "1:00 PM", "1:30 PM", "2:00 PM", "2:30 PM", "3:00 PM", "3:30 PM", "4:00 PM", "4:30 PM", "5:00 PM", "5:30 PM", "6:00 PM", "6:30 PM", "7:00 PM"];
        const timeSelect = document.getElementById('time');
        times.forEach(t => {
            let opt = document.createElement('option');
            opt.value = t; opt.innerHTML = t;
            timeSelect.appendChild(opt);
        });

        function moveNo() {
            const btn = document.getElementById('no-btn');
            btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        }

        function showForm() {
            document.getElementById('first-screen').classList.add('hidden');
            document.getElementById('form-screen').classList.remove('hidden');
        }

        function finish() {
            const day = document.getElementById('day').value;
            const time = document.getElementById('time').value;
            const food = document.querySelector('input[name="food"]:checked').value;
            
            document.getElementById('form-screen').classList.add('hidden');
            document.getElementById('finish-screen').classList.remove('hidden');
            document.getElementById('summary-text').innerText = 
                `💖 DATE SUCCESSFULLY SET 💖\n\n📅 July ${day}\n\n🕒 ${time}\n\n🍽 ${food}\n\nI can't wait to see you ❤️`;
        }
    </script>
</body>
</html>
